defaults:
  - default_dataset.yaml
  - _self_

exp_name: zju_vggt_geom_unproject_source_policy_uniform_rawpool_minimal
zju_dir: /YOUR/PATH/TO/ZJU
zju_seq_names: CoreView_390
zju_geom_subdir: vggt_geom
zju_camera_source: gt
zju_mask_source: mask
zju_source_policy: uniform_ring
zju_source_view_pool: geom_plus_raw
zju_source_anchor_policy: random
zju_min_supervised_views: 1
zju_min_depth_conf: 0.0
zju_holdout_stride: 10
img_size: 518
num_workers: 0
seed_value: 42
accum_steps: 1
patch_size: 14
val_epoch_freq: 1
max_img_per_gpu: 4

limit_train_batches: 10
limit_val_batches: 5

data:
  train:
    _target_: data.dynamic_dataloader.DynamicTorchDataset
    num_workers: ${num_workers}
    max_img_per_gpu: ${max_img_per_gpu}
    common_config:
      img_size: ${img_size}
      patch_size: ${patch_size}
      debug: False
      repeat_batch: False
      fix_img_num: 4
      fix_aspect_ratio: 1.0
      allow_duplicate_img: False
      load_depth: True
    dataset:
      _target_: data.composed_dataset.ComposedDataset
      dataset_configs:
        - _target_: data.datasets.zju_vggt_geom.ZjuVggtGeomDataset
          split: train
          ZJU_DIR: ${zju_dir}
          seq_names: ${zju_seq_names}
          geom_subdir: ${zju_geom_subdir}
          camera_source: ${zju_camera_source}
          mask_source: ${zju_mask_source}
          source_policy: ${zju_source_policy}
          source_view_pool: ${zju_source_view_pool}
          source_anchor_policy: ${zju_source_anchor_policy}
          min_supervised_views: ${zju_min_supervised_views}
          min_depth_conf: ${zju_min_depth_conf}
          holdout_stride: ${zju_holdout_stride}
  val:
    _target_: data.dynamic_dataloader.DynamicTorchDataset
    num_workers: ${num_workers}
    max_img_per_gpu: ${max_img_per_gpu}
    common_config:
      img_size: ${img_size}
      patch_size: ${patch_size}
      debug: False
      fix_img_num: 4
      fix_aspect_ratio: 1.0
      allow_duplicate_img: False
      load_depth: True
    dataset:
      _target_: data.composed_dataset.ComposedDataset
      dataset_configs:
        - _target_: data.datasets.zju_vggt_geom.ZjuVggtGeomDataset
          split: test
          ZJU_DIR: ${zju_dir}
          seq_names: ${zju_seq_names}
          geom_subdir: ${zju_geom_subdir}
          camera_source: ${zju_camera_source}
          mask_source: ${zju_mask_source}
          source_policy: ${zju_source_policy}
          source_view_pool: ${zju_source_view_pool}
          source_anchor_policy: ${zju_source_anchor_policy}
          min_supervised_views: ${zju_min_supervised_views}
          min_depth_conf: ${zju_min_depth_conf}
          holdout_stride: ${zju_holdout_stride}

logging:
  log_dir: logs
  log_visuals: False
  log_freq: 1
  log_level_primary: DEBUG
  log_level_secondary: WARNING
  all_ranks: False
  tensorboard_writer:
    _target_: train_utils.tb_writer.TensorBoardLogger
    path: ${logging.log_dir}/tensorboard
  scalar_keys_to_log:
    train:
      keys_to_log:
        - loss_objective
        - loss_camera
        - loss_T
        - loss_R
        - loss_FL
        - loss_conf_depth
        - loss_reg_depth
        - loss_grad_depth
        - loss_unproject_geometry
    val:
      keys_to_log:
        - loss_objective
        - loss_camera
        - loss_T
        - loss_R
        - loss_FL
        - loss_conf_depth
        - loss_reg_depth
        - loss_grad_depth
        - loss_unproject_geometry

checkpoint:
  save_dir: logs/${exp_name}/ckpts
  save_freq: 1
  resume_checkpoint_path: /YOUR/PATH/TO/CKPT
  strict: False

loss:
  _target_: loss.MultitaskLoss
  camera:
    _target_: loss.compute_camera_loss
    weight: 1.0
    loss_type: l1
    gamma: 0.8
    pose_encoding_type: absT_quaR_FoV
    weight_trans: 1.0
    weight_rot: 1.0
    weight_focal: 0.5
  depth:
    _target_: loss.compute_depth_loss
    weight: 1.0
    gamma: 1.0
    alpha: 0.2
    gradient_loss_fn: grad+conf
    valid_range: 0.98
  point: null
  track: null
  unproject_geometry:
    _target_: loss.compute_unproject_geometry_loss
    weight: 0.2
    loss_type: l2
    valid_range: 0.98
    min_valid_points: 100
    pose_encoding_type: absT_quaR_FoV
    use_depth_conf_gate: False
    detach_depth_conf: True
    depth_conf_power: 1.0
    depth_conf_threshold: 0.0
    use_foreground_region_mask: False
    foreground_erode_px: 0
    foreground_drop_bottom_ratio: 0.0

optim:
  param_group_modifiers: False
  optimizer:
    _target_: torch.optim.AdamW
    lr: 5e-5
    weight_decay: 0.05
  frozen_module_names:
    - "*aggregator*"
  amp:
    enabled: True
    amp_dtype: bfloat16
  gradient_clip:
    _target_: train_utils.gradient_clip.GradientClipper
    configs:
      - module_name: ["aggregator"]
        max_norm: 1.0
        norm_type: 2
      - module_name: ["depth"]
        max_norm: 1.0
        norm_type: 2
      - module_name: ["camera"]
        max_norm: 1.0
        norm_type: 2
  options:
    lr:
      - scheduler:
          _target_: fvcore.common.param_scheduler.CompositeParamScheduler
          schedulers:
            - _target_: fvcore.common.param_scheduler.LinearParamScheduler
              start_value: 1e-8
              end_value: 5e-5
            - _target_: fvcore.common.param_scheduler.CosineParamScheduler
              start_value: 5e-5
              end_value: 1e-8
          lengths: [0.05, 0.95]
          interval_scaling: ['rescaled', 'rescaled']
    weight_decay:
      - scheduler:
          _target_: fvcore.common.param_scheduler.ConstantParamScheduler
          value: 0.05

max_epochs: 1

model:
  _target_: vggt.models.vggt.VGGT
  enable_camera: True
  enable_depth: True
  enable_point: False
  enable_track: False

distributed:
  backend: gloo
  comms_dtype: None
  find_unused_parameters: False
  timeout_mins: 30
  gradient_as_bucket_view: True
  bucket_cap_mb: 25
  broadcast_buffers: True

cuda:
  cudnn_deterministic: False
  cudnn_benchmark: False
  allow_tf32: True
