defaults:
  - 4k4d_prior_case_6view_focus_strongfusion
  - _self_

exp_name: 4k4d_prior_case_6view_singlecase_overfit_b40
max_epochs: 1
limit_train_batches: 40
limit_val_batches: 5

data:
  train:
    dataset:
      dataset_configs:
        - _target_: data.datasets.dna4k4d_pseudo.DNA4K4DPseudoDataset
          split: train
          len_train: 200
          len_test: 20
          case_roots:
            - D:/vggt/vggt-main/output/training_cases/0012_11_frame0000_6views_sparseproto_smplxsurfacepose_v2
  val:
    dataset:
      dataset_configs:
        - _target_: data.datasets.dna4k4d_pseudo.DNA4K4DPseudoDataset
          split: test
          len_train: 200
          len_test: 20
          case_roots:
            - D:/vggt/vggt-main/output/training_cases/0012_11_frame0000_6views_sparseproto_smplxsurfacepose_v2
