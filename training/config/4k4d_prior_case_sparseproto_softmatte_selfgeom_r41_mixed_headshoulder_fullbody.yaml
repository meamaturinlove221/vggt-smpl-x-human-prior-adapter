defaults:
  - 4k4d_prior_case_sparseproto_softmatte_selfgeom_r40_partaware_softweight_bodyhand
  - _self_

exp_name: 4k4d_prior_case_sparseproto_softmatte_selfgeom_r41_mixed_headshoulder_fullbody

# Local diagnostic only.
# r40 showed useful body/hand behavior and a valid normal gate, but the actual
# mentor headshoulder protocol still produced shell-like face Open3D. This
# variant changes only the data mix: the same self-geometry + soft weighting +
# part-aware weak SMPL-X body/hand anchor now trains on the same 6-view
# headshoulder protocol used by the gate, while keeping the fullbody/softmatte
# case as the bottom-line rehearsal. No hard head/face teacher is introduced.

limit_train_batches: 6
limit_val_batches: 2
max_epochs: 1

data:
  train:
    common_config:
      fix_img_num: 6
      img_nums: [6, 6]
      repeat_batch: False
      prior_pose_noise:
        enabled: False
    dataset:
      dataset_configs:
        - _target_: data.datasets.dna4k4d_pseudo.DNA4K4DPseudoDataset
          split: train
          len_train: 24
          len_test: 4
          case_roots:
            - D:/vggt/vggt-main/output/training_cases/0012_11_frame0000_6views_sparseproto_headshoulder_r41_partaware_softweight_bodyhand_anchor
        - _target_: data.datasets.dna4k4d_pseudo.DNA4K4DPseudoDataset
          split: train
          len_train: 24
          len_test: 4
          case_roots:
            - D:/vggt/vggt-main/output/training_cases/0012_11_frame0000_6views_preprocess_crop_softmatte_v2_b40_r40_partaware_softweight_bodyhand_anchor
  val:
    common_config:
      fix_img_num: 6
      img_nums: [6, 6]
      repeat_batch: False
      prior_pose_noise:
        enabled: False
    dataset:
      dataset_configs:
        - _target_: data.datasets.dna4k4d_pseudo.DNA4K4DPseudoDataset
          split: test
          len_train: 24
          len_test: 4
          case_roots:
            - D:/vggt/vggt-main/output/training_cases/0012_11_frame0000_6views_sparseproto_headshoulder_r41_partaware_softweight_bodyhand_anchor
        - _target_: data.datasets.dna4k4d_pseudo.DNA4K4DPseudoDataset
          split: test
          len_train: 24
          len_test: 4
          case_roots:
            - D:/vggt/vggt-main/output/training_cases/0012_11_frame0000_6views_preprocess_crop_softmatte_v2_b40_r40_partaware_softweight_bodyhand_anchor

checkpoint:
  save_dir: output/local_training_results/r41_mixed_headshoulder_fullbody_smoke1/ckpts
  save_freq: 1
  save_optimizer_state: False
  resume_checkpoint_path: D:/vggt/vggt-main/output/modal_training_results/20260429_normal_r20_point_to_point_xview_smoke20_from_ckpt4/inference_model.pt
  strict: False

logging:
  log_dir: output/local_training_results/r41_mixed_headshoulder_fullbody_smoke1/logs

optim:
  frozen_module_names:
    - aggregator
    - camera_head
    - normal_head
  optimizer:
    lr: 4e-7
