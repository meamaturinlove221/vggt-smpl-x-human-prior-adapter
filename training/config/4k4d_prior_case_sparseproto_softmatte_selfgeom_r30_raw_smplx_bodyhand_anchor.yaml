defaults:
  - 4k4d_prior_case_sparseproto_softmatte_selfgeom_r27_depth_point_normal_direct
  - _self_

exp_name: 4k4d_prior_case_sparseproto_softmatte_selfgeom_r30_raw_smplx_bodyhand_anchor

# Local diagnostic only.
# This variant is not a face teacher retry. It uses raw SMPL-X body plus
# per-box best-side hand rasterization only as a weak body/hand stabilizer,
# while teacher_mask remains full human support for self-geometry. Head, face,
# hairline, and ear-band are excluded from the SMPL-X prior losses.

max_img_per_gpu: 6
num_workers: 0
limit_train_batches: 8
limit_val_batches: 2
max_epochs: 1

distributed:
  backend: single

data:
  train:
    common_config:
      fix_img_num: 6
      img_nums: [6, 6]
      repeat_batch: False
      prior_pose_noise:
        enabled: False
    dataset:
      dataset_configs:
        - _target_: data.datasets.dna4k4d_pseudo.DNA4K4DPseudoDataset
          split: train
          len_train: 32
          len_test: 4
          case_roots:
            - D:/vggt/vggt-main/output/training_cases/0012_11_frame0000_6views_preprocess_crop_softmatte_v2_b40_r30_raw_smplx_bodyhand_anchor
  val:
    common_config:
      fix_img_num: 6
      img_nums: [6, 6]
      repeat_batch: False
      prior_pose_noise:
        enabled: False
    dataset:
      dataset_configs:
        - _target_: data.datasets.dna4k4d_pseudo.DNA4K4DPseudoDataset
          split: test
          len_train: 32
          len_test: 4
          case_roots:
            - D:/vggt/vggt-main/output/training_cases/0012_11_frame0000_6views_preprocess_crop_softmatte_v2_b40_r30_raw_smplx_bodyhand_anchor

checkpoint:
  save_dir: output/local_training_results/r30_raw_smplx_bodyhand_anchor_smoke1/ckpts
  save_freq: 1
  save_optimizer_state: False
  resume_checkpoint_path: D:/vggt/vggt-main/output/modal_training_results/20260429_normal_r20_point_to_point_xview_smoke20_from_ckpt4/inference_model.pt
  strict: False

optim:
  frozen_module_names:
    - aggregator
    - camera_head
    - normal_head
  optimizer:
    lr: 5e-7

loss:
  human_prior:
    weight: 0.10
    depth:
      gamma: 1.0
      alpha: 0.0
      gradient_loss_fn: null
      valid_range: 0.96
      supervise_conf: false
      loss_weight: 0.025
      exclude_head_roi: true
      exclude_face_roi: true
      exclude_hairline_roi: true
      exclude_ear_band_roi: true
      boundary_boost: 1.0
    point:
      gamma: 1.0
      alpha: 0.0
      gradient_loss_fn: null
      valid_range: 0.96
      supervise_conf: false
      loss_weight: 0.040
      exclude_head_roi: true
      exclude_face_roi: true
      exclude_hairline_roi: true
      exclude_ear_band_roi: true
      boundary_boost: 1.0
