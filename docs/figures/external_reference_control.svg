<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="390" viewBox="0 0 1180 390">
  <defs>
    <style>
      text{font-family:Arial,Helvetica,sans-serif;fill:#0f172a}.title{font-size:32px;font-weight:700}.sub{font-size:17px;fill:#475569}.h{font-size:18px;font-weight:700}.small{font-size:13px;fill:#475569}.box{fill:#fff;stroke:#cbd5e1;stroke-width:1.5}.arr{stroke:#2563eb;stroke-width:3;fill:none;marker-end:url(#arrow)}.warn{fill:#fff7ed;stroke:#fb923c}.stop{fill:#fef2f2;stroke:#ef4444}.ok{fill:#ecfdf5;stroke:#10b981}
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto"><path d="M0 0 L10 5 L0 10 Z" fill="#2563eb"/></marker>
  </defs>
  <rect width="1180" height="390" fill="#f8fafc"/>
  <text x="590" y="48" text-anchor="middle" class="title">External Reference Control</text>
  <text x="590" y="78" text-anchor="middle" class="sub">A geometry reference route for debugging, not a student-model result</text>

  <g transform="translate(70 130)">
    <rect width="200" height="135" rx="18" class="box"/>
    <text x="100" y="42" text-anchor="middle" class="h">Reference Source</text>
    <text x="100" y="72" text-anchor="middle" class="small">external geometry</text>
    <text x="100" y="94" text-anchor="middle" class="small">or teacher output</text>
  </g>
  <path d="M282 198 L370 198" class="arr"/>
  <g transform="translate(385 130)">
    <rect width="200" height="135" rx="18" class="warn"/>
    <text x="100" y="42" text-anchor="middle" class="h">Fusion Check</text>
    <text x="100" y="72" text-anchor="middle" class="small">alignment and visible</text>
    <text x="100" y="94" text-anchor="middle" class="small">surface inspection</text>
  </g>
  <path d="M598 198 L686 198" class="arr"/>
  <g transform="translate(700 130)">
    <rect width="200" height="135" rx="18" class="ok"/>
    <text x="100" y="42" text-anchor="middle" class="h">Control Evidence</text>
    <text x="100" y="72" text-anchor="middle" class="small">camera, mask, and</text>
    <text x="100" y="94" text-anchor="middle" class="small">teacher audit</text>
  </g>
  <path d="M912 198 L990 198" class="arr"/>
  <g transform="translate(1000 130)">
    <rect width="120" height="135" rx="18" class="stop"/>
    <text x="60" y="42" text-anchor="middle" class="h">Boundary</text>
    <text x="60" y="72" text-anchor="middle" class="small">supporting</text>
    <text x="60" y="94" text-anchor="middle" class="small">evidence only</text>
  </g>

  <rect x="105" y="305" width="970" height="52" rx="16" fill="#eef2ff" stroke="#818cf8"/>
  <text x="590" y="338" text-anchor="middle" class="sub">Final claims still require VGGT-owned human-main full-scene RGB point-cloud evidence under the same view and bounds.</text>
</svg>
