<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 500" width="100%"><rect width="1400" height="500" rx="28" fill="#fbfcff"/><text x="48" y="58" font-family="Inter,Arial,sans-serif" font-size="34" font-weight="800" fill="#111827">Evidence &amp; Failure Boundaries</text><text x="50" y="90" font-family="Inter,Arial,sans-serif" font-size="16" fill="#5b6472">Conservative evidence table: keep result, diagnostic, and boundary visible.</text><text x="50" y="90" font-family="Inter,Arial,sans-serif" font-size="15" font-weight="700" fill="#334155">Route / artifact</text><text x="360" y="90" font-family="Inter,Arial,sans-serif" font-size="15" font-weight="700" fill="#334155">Observed signal</text><text x="720" y="90" font-family="Inter,Arial,sans-serif" font-size="15" font-weight="700" fill="#334155">Interpretation</text><text x="1060" y="90" font-family="Inter,Arial,sans-serif" font-size="15" font-weight="700" fill="#334155">Boundary</text><rect x="36" y="105" width="1328" height="64" rx="14" fill="#ffffff" stroke="#dbe4ef"/><text x="50" y="134" font-family="Inter,Arial,sans-serif" font-size="15" fill="#111827"><tspan x="50" dy="0">Vanilla VGGT baseline</tspan></text><text x="360" y="134" font-family="Inter,Arial,sans-serif" font-size="15" fill="#111827"><tspan x="360" dy="0">scene geometry owner</tspan></text><text x="720" y="134" font-family="Inter,Arial,sans-serif" font-size="15" fill="#111827"><tspan x="720" dy="0">reference model output</tspan></text><text x="1060" y="134" font-family="Inter,Arial,sans-serif" font-size="15" fill="#111827"><tspan x="1060" dy="0">baseline, not modified claim</tspan></text><rect x="36" y="177" width="1328" height="64" rx="14" fill="#f8fafc" stroke="#dbe4ef"/><text x="50" y="206" font-family="Inter,Arial,sans-serif" font-size="15" fill="#111827"><tspan x="50" dy="0">SMPL-X teacher / prior</tspan></text><text x="360" y="206" font-family="Inter,Arial,sans-serif" font-size="15" fill="#111827"><tspan x="360" dy="0">coarse pose-aligned body surface</tspan></text><text x="720" y="206" font-family="Inter,Arial,sans-serif" font-size="15" fill="#111827"><tspan x="720" dy="0">supervision / alignment signal</tspan></text><text x="1060" y="206" font-family="Inter,Arial,sans-serif" font-size="15" fill="#111827"><tspan x="1060" dy="0">not final output</tspan></text><rect x="36" y="249" width="1328" height="64" rx="14" fill="#ffffff" stroke="#dbe4ef"/><text x="50" y="278" font-family="Inter,Arial,sans-serif" font-size="15" fill="#111827"><tspan x="50" dy="0">6-view face/head ROI</tspan></text><text x="360" y="278" font-family="Inter,Arial,sans-serif" font-size="15" fill="#111827"><tspan x="360" dy="0">local facial structure visible</tspan></text><text x="720" y="278" font-family="Inter,Arial,sans-serif" font-size="15" fill="#111827"><tspan x="720" dy="0">promising but unstable</tspan></text><text x="1060" y="278" font-family="Inter,Arial,sans-serif" font-size="15" fill="#111827"><tspan x="1060" dy="0">not final advisor pass</tspan></text><rect x="36" y="321" width="1328" height="64" rx="14" fill="#f8fafc" stroke="#dbe4ef"/><text x="50" y="350" font-family="Inter,Arial,sans-serif" font-size="15" fill="#111827"><tspan x="50" dy="0">Full-scene RGB point cloud</tspan></text><text x="360" y="350" font-family="Inter,Arial,sans-serif" font-size="15" fill="#111827"><tspan x="360" dy="0">human subject + scene context</tspan></text><text x="720" y="350" font-family="Inter,Arial,sans-serif" font-size="15" fill="#111827"><tspan x="720" dy="0">main advisor-facing target</tspan></text><text x="1060" y="350" font-family="Inter,Arial,sans-serif" font-size="15" fill="#111827"><tspan x="1060" dy="0">must be VGGT-owned output</tspan></text></svg>